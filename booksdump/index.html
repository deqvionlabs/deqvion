<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Booksdump | Dump Labs</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body class="booksdump-body">
    <main class="booksdump-page" aria-label="Booksdump">
      <header class="booksdump-topbar">
        <a href="../product.html" aria-label="Back to Dump Labs products">
          <strong>booksdump</strong>
         <span>by dump</span>
        </a>
      </header>

      <section class="booksdump-hero">
        <p class="booksdump-kicker">read inside telegram</p>
        <h1>Read books inside Telegram.</h1>
        <p>
          Add a book with a Google Drive link or send the file to the bot. Booksdump keeps reading
          simple, comfortable, and always close to your chats.
        </p>
        <a class="booksdump-button" href="https://t.me/BkDump_bot" aria-label="Try Booksdump">try booksdump</a>
      </section>

      <section class="booksdump-preview" aria-label="Booksdump screenshot preview">
        <img
          class="booksdump-screenshot"
          src="assets/booksdump-screen.png"
          srcset="assets/booksdump-screen.png 1x, assets/booksdump-screen@2x.png 2x"
          alt="Booksdump app screenshot"
        >
      </section>
    </main>
  </body>
